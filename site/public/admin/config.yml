backend:
  name: github
  repo: aneuhold/aurora-colony-pub
  branch: main
  base_url: https://aurora-cms-auth.agneuhold.workers.dev
  auth_endpoint: auth

# Media uploads go directly to the `aurora-colony-pub-media` R2 bucket via
# Sveltia's built-in R2 mode (https://sveltiacms.app/en/docs/media/cloudflare-r2).
# The secret access key is delivered to localStorage by the admin shell's
# bridge after GitHub OAuth (see site/src/pages/admin/index.astro); only the
# non-secret access key ID is committed here.
media_libraries:
  default:
    name: cloudflare_r2
  all:
    max_file_size: 10485760
    slugify_filename: true
  cloudflare_r2:
    account_id: f5fee77ff79a01ea91f541b825d003a3
    bucket: aurora-colony-pub-media
    public_url: https://media.auroracolonypub.aneuhold.dev
    access_key_id: bf815175d41ac6a0e8a08b3659aa1615

collections:
  - name: pubInfo
    label: General Pub Info
    description: Site-wide pub info shown across the home, menu, about, contact, and footer.
    files:
      - name: titleTagline
        label: Title + Tagline
        file: site/src/content/title-tagline.json
        format: json
        editor:
          preview: false
        fields:
          - {
              name: title,
              label: Title,
              widget: string,
              hint: 'Big headline shown at the top of the home page.'
            }
          - {
              name: tagline,
              label: Tagline,
              widget: string,
              required: false,
              hint: 'One short line shown under the title. Leave blank for none.'
            }

      - name: about
        label: About
        file: site/src/content/about.md
        format: frontmatter
        fields:
          - {
              name: heading,
              label: Heading,
              widget: string,
              hint: 'Heading shown above the About text.'
            }
          - {
              name: body,
              label: Text,
              widget: markdown,
              hint: 'Free-form text — supports bold, links, headings, and inline images.'
            }

      - name: contact
        label: Contact Info
        file: site/src/content/contact.json
        format: json
        editor:
          preview: false
        fields:
          - {
              name: phone,
              label: Phone,
              widget: string,
              hint: "Phone number, formatted however you'd like it shown — e.g. (503) 678-9994."
            }
          - {
              name: email,
              label: Email,
              widget: string,
              hint: 'Public contact email — also used as a mailto: link.'
            }
          - {
              name: orderUrl,
              label: DoorDash URL,
              widget: string,
              required: false,
              hint: 'Full URL to the DoorDash storefront. When set, the Order button appears in the nav and on the home hero. Leave blank to hide both.'
            }

      - name: hours
        label: Hours
        file: site/src/content/hours.json
        format: json
        editor:
          preview: false
        fields:
          - name: weekly
            label: Weekly hours
            widget: list
            hint: 'One entry per day or day-range. Entries render in the order shown here.'
            fields:
              - { name: label, label: Day(s), widget: string, hint: 'e.g. Mon–Thu, Fri, Sat, Sun' }
              - { name: open, label: Open, widget: string, hint: 'e.g. 11:00 AM' }
              - { name: close, label: Close, widget: string, hint: 'e.g. 10:00 PM' }
          - name: happyHour
            label: Happy hour
            widget: object
            hint: 'Shown as a single line under the weekly table.'
            fields:
              - { name: label, label: Day(s), widget: string, hint: 'e.g. Mon–Fri' }
              - { name: start, label: Start, widget: string, hint: 'e.g. 3:00 PM' }
              - { name: end, label: End, widget: string, hint: 'e.g. 6:00 PM' }
              - {
                  name: note,
                  label: Note,
                  widget: string,
                  required: false,
                  hint: 'Optional fine print — e.g. Dine-in only. No substitutions.'
                }

      - name: socialMediaLinks
        label: Social Media Links
        file: site/src/content/social-media-links.json
        format: json
        editor:
          preview: false
        fields:
          - name: links
            label: Links
            widget: list
            summary: '{{fields.label}} — {{fields.url}}'
            hint: 'Each entry becomes one link in the footer. Add as many as you want — Facebook, Instagram, Yelp, etc.'
            fields:
              - {
                  name: label,
                  label: Label,
                  widget: string,
                  hint: 'What the link should say — e.g. Facebook, Instagram.'
                }
              - { name: url, label: URL, widget: string, hint: 'Full URL including https://.' }

  - name: menuImages
    label: Menu Images
    description: Menu images shown on the menu page. One entry per menu page.
    folder: site/src/content/menu-images
    create: true
    delete: true
    slug: '{{fields.category}}-{{fields.order}}'
    format: json
    fields:
      - { name: title, label: Title, widget: string, hint: 'e.g. Main Menu — Page 1' }
      - {
          name: category,
          label: Category,
          widget: select,
          options: [main, breakfast, kids, happy-hour],
          default: main,
          hint: 'Which menu does this page belong to?'
        }
      - { name: image, label: Image, widget: image, hint: 'Upload the menu image. JPG or PNG.' }
      - {
          name: order,
          label: Display order,
          widget: number,
          default: 0,
          hint: 'Lower numbers show first within the same menu.'
        }

  - name: gallery
    label: Gallery Photos
    description: Photos shown in the gallery on the homepage. Lower display order shows first.
    folder: site/src/content/gallery
    create: true
    delete: true
    slug: '{{fields.alt | slugify}}-{{year}}{{month}}{{day}}'
    format: json
    fields:
      - {
          name: photo,
          label: Photo,
          widget: image,
          hint: 'Upload a JPG or PNG. It will be optimized automatically.'
        }
      - {
          name: alt,
          label: Description,
          widget: string,
          hint: "Short, specific description of what's in the photo — used by screen readers and Google image search. Write what someone would see, e.g. 'Bartender pouring a beer at Aurora Colony Pub', not 'drink'."
        }
      - {
          name: order,
          label: Display order,
          widget: number,
          default: 0,
          hint: "Lower numbers show first. Leave at 0 if you don't care about order."
        }
