name: 'Pull Request: Site'

# Root files (lockfile, base tsconfig, this workflow, etc.) can affect the
# site build, so they're listed alongside `site/**` to force a rebuild when
# they change.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'site/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/pull-request-site.yml'

jobs:
  build-site:
    name: 'Build site'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PNPM
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm build:site

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-dist-pr
          path: site/dist/
          retention-days: 1

  deploy-preview:
    name: 'Deploy Cloudflare Pages preview'
    runs-on: ubuntu-latest
    needs: build-site
    permissions:
      contents: read
      deployments: write
    outputs:
      preview-url: ${{ steps.pages.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-dist-pr
          path: site/dist

      - name: Deploy to Cloudflare Pages (preview)
        id: pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=aurora-colony-pub-frontend --branch=${{ github.head_ref }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  lighthouse:
    name: 'Lighthouse (PR vs prod)'
    runs-on: ubuntu-latest
    needs: deploy-preview
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.deploy-preview.outputs.preview-url }}
            https://auroracolonypub.com
          temporaryPublicStorage: true

      - name: Post sticky Lighthouse comment
        if: always()
        uses: actions/github-script@v9
        env:
          MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
          LINKS: ${{ steps.lighthouse.outputs.links }}
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        with:
          script: |
            const manifest = JSON.parse(process.env.MANIFEST || '[]');
            const links = JSON.parse(process.env.LINKS || '{}');
            const previewUrl = process.env.PREVIEW_URL;
            const prodUrl = 'https://auroracolonypub.com';

            const find = (url) =>
              manifest.find((r) => r.url === url && r.isRepresentativeRun) ||
              manifest.find((r) => r.url === url);
            const pr = find(previewUrl);
            const prod = find(prodUrl);

            const fmt = (n) => Math.round((n ?? 0) * 100);
            const delta = (a, b) => {
              const d = fmt(a) - fmt(b);
              if (d > 0) return `🟢 +${d}`;
              if (d < 0) return `🔴 ${d}`;
              return '🟡 0';
            };

            const cats = ['performance', 'accessibility', 'best-practices', 'seo'];
            const rows = cats.map((c) => {
              const prScore = fmt(pr?.summary?.[c]);
              const prodScore = fmt(prod?.summary?.[c]);
              return `| ${c} | ${prScore} | ${prodScore} | ${delta(pr?.summary?.[c], prod?.summary?.[c])} |`;
            });

            const body = `## 🚦 Lighthouse: PR vs prod

            🔗 PR preview: ${previewUrl}
            🔗 prod: ${prodUrl}

            | Category | PR | prod | Δ |
            |----------|----|------|---|
            ${rows.join('\n')}

            📊 [PR report](${links[previewUrl] || 'N/A'}) · [prod report](${links[prodUrl] || 'N/A'})`;

            // Sticky-comment behavior via REST: find prior comment by header marker.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const prior = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('🚦 Lighthouse: PR vs prod')
            );
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
