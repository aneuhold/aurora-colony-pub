name: 'Main Branch Actions'

on:
  push:
    branches:
      - main

jobs:
  deploy-site:
    name: 'Deploy site to Cloudflare Pages'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up PNPM
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm build:site

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          directory: site/dist
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-workers:
    name: 'Deploy workers'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PNPM
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # `deploy:workers` runs `wrangler deploy` for every worker in parallel
      # via pnpm. One job is plenty — each deploy is small.
      - name: Deploy workers
        run: pnpm deploy:workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
