name: 'Main Branch: Deploy Workers'

# Root files (lockfile, base tsconfig, this workflow, etc.) can affect worker
# deploys, so they're listed alongside `workers/**` to force a deploy when
# they change.
on:
  push:
    branches:
      - main
    paths:
      - 'workers/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/main-branch-workers.yml'

jobs:
  deploy-workers:
    name: 'Deploy workers'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PNPM
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # `deploy:workers` runs `wrangler deploy` for every worker in parallel
      # via pnpm. One job is plenty — each deploy is small.
      - name: Deploy workers
        run: pnpm deploy:workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
